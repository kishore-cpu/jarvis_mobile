<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#060610">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="J.A.R.V.I.S — Just A Rather Very Intelligent System. Your personal AI assistant.">
  <title>J.A.R.V.I.S</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo"></div>
      <div>
        <div class="header-title">J.A.R.V.I.S</div>
        <div class="header-subtitle"><span class="status-dot"></span>ONLINE</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-memory" title="Memories">🧠</button>
      <button class="header-btn" id="btn-settings" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- ─── Chat Area ───────────────────────────────────────────────── -->
  <main class="chat-area" id="chat-area">

    <!-- Welcome screen (shown until API key is set) -->
    <div class="welcome" id="welcome-screen">
      <div class="welcome-reactor"></div>
      <h2>J.A.R.V.I.S</h2>
      <p>Just A Rather Very Intelligent System<br>Your personal AI assistant, sir.</p>
      <div class="api-prompt">
        <input type="password" id="welcome-key-input" placeholder="Enter Gemini API Key" autocomplete="off">
        <button id="welcome-save-key">Initialize JARVIS</button>
      </div>
    </div>

  </main>

  <!-- ─── Input Area ──────────────────────────────────────────────── -->
  <div class="input-area">
    <button class="voice-btn" id="voice-btn" title="Voice input">🎤</button>
    <div class="input-wrapper">
      <textarea id="input-box" rows="1" placeholder="Talk to JARVIS..." autocomplete="off"></textarea>
    </div>
    <button class="send-btn" id="send-btn" title="Send">➤</button>
  </div>

  <!-- ─── Settings Panel ─────────────────────────────────────────── -->
  <div class="overlay" id="settings-overlay"></div>
  <aside class="panel" id="settings-panel">
    <div class="panel-header">
      <span class="panel-title">SETTINGS</span>
      <button class="panel-close" id="settings-close">✕</button>
    </div>
    <div class="panel-body">
      <div class="panel-section">
        <div class="panel-section-title">Gemini API Key</div>
        <input type="password" class="panel-input" id="api-key-input" placeholder="AIza..." autocomplete="off">
        <button class="panel-btn" id="save-api-key">Save Key</button>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Session</div>
        <button class="panel-btn" id="clear-history-btn">Clear Chat History</button>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Memory</div>
        <button class="panel-btn danger" id="clear-memory-btn">Reset All Memories</button>
      </div>
    </div>
  </aside>

  <!-- ─── Memory Panel ───────────────────────────────────────────── -->
  <div class="overlay" id="memory-overlay"></div>
  <aside class="panel" id="memory-panel">
    <div class="panel-header">
      <span class="panel-title">MEMORIES</span>
      <button class="panel-close" id="memory-close">✕</button>
    </div>
    <div class="panel-body" id="memory-list"></div>
  </aside>

  <!-- ─── Toast ───────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ─── Scripts (order matters: config → memory → social → commands → brain → app) ─── -->
  <script src="config.js"></script>
  <script src="memory.js"></script>
  <script src="social.js"></script>
  <script src="commands.js"></script>
  <script src="brain.js"></script>
  <script src="app.js"></script>

  <!-- ─── Service Worker Registration ─────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>

</body>
</html>
